name: Hotfix Template

on:
  push:
    paths:
      - '_hotfix/go.txt'

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply hotfix
        run: python3 hotfix_consult.py

      - name: Rebuild dashboard
        run: |
          python3 refresh_dashboard_beta.py
          cp investing-dashboard-beta.html index.html
          echo "Built: $(wc -c < index.html) bytes"

      - name: Commit and push
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@noreply.github.com"
          git rm -r --quiet _hotfix || true
          git add dashboard_template_beta.html dashboard_data_beta.json index.html investing-dashboard-beta.html
          git diff --staged --quiet && echo "no changes" || git commit -m "Hotfix 2.6.1: dropdown price/change + adaptive consultant picks"
          git pull --rebase origin main
          git push
