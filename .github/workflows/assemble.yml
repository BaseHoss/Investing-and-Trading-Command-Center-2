name: Cleanup Staging

on:
  push:
    paths:
      - '_parts/cleanup.txt'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove staging artifacts and this workflow
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@noreply.github.com"
          git rm -r --quiet _parts || true
          git rm --quiet .github/workflows/assemble.yml || true
          git commit -m "Cleanup: remove part-staging and one-shot workflow"
          git pull --rebase origin main
          git push
